<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="left-side">

            <img src="studentimage 1.jpg" alt="Student Image">

            <h2>Maha Lakshmi</h2>

            <h3>BCA - Bachelor Of Computer Applications</h3>

        </div>



        <!-- RIGHT SIDE -->

        <div class="right-side">

            <h1>Student Profile Form</h1>

            <form>

                <div class="row">
                    <div class="input-box">
                        <label>Name</label>
                        <input type="text" placeholder="Name">
                    </div>

                    <div class="input-box">
                        <label>First Name</label>
                        <input type="text" placeholder="First Name">
                    </div>

                    <div class="input-box">
                        <label>Last Name</label>
                        <input type="text" placeholder="Last Name">
                    </div>
                </div>

                <div class="row">
                    <div class="input-box">
                        <label>Age</label>
                        <input type="number" placeholder="Age">
                    </div>

                    <div class="input-box">
                        <label>Gender</label>
                        <select>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="input-box">
                        <label>Course / Degree</label>
                        <input type="text" placeholder="Degree">
                    </div>

                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" placeholder="Email">
                    </div>
                </div>

                <div class="row">
                    <div class="input-box">
                        <label>Phone Number</label>
                        <input type="text" placeholder="Phone Number">
                    </div>

                    <div class="input-box">
                        <label>Address</label>
                        <input type="text" placeholder="Address">
                    </div>
                </div>

                <div class="input-box">
                    <label>Skills</label>
                    <textarea placeholder="C, C++, Java, Python, MySQL"></textarea>
                </div>

                <div class="input-box">
                    <label>Hobbies</label>
                    <textarea placeholder="Reading books, Music, Dancing, Coding"></textarea>
                </div>

                <div class="input-box">
                    <label>Languages Known</label>
                    <textarea placeholder="Tamil, English, Hindi, Telugu, Malayalam"></textarea>
                </div>

                <div class="input-box">
                    <label>Career Objective</label>
                    <textarea class="big-text"
                    placeholder="To start my career in the IT industry as a software professional..."></textarea>
                </div>

                <button type="submit">Submit</button>

            </form>

        </div>

    </div>

</body>
</html>
